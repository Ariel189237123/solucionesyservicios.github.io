
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Admin - Obras</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    background:linear-gradient(to bottom,#eef5ff,#ffffff);
    min-height:100vh;
    padding:40px 20px;
}

.container{
    max-width:1200px;
    margin:auto;
}

h1{
    text-align:center;
    font-size:3rem;
    color:#004aad;
    margin-bottom:10px;
}

.sub{
    text-align:center;
    color:#64748b;
    margin-bottom:50px;
}

.formulario{
    background:white;
    padding:35px;
    border-radius:30px;
    box-shadow:0 15px 40px rgba(0,70,170,.12);
    margin-bottom:50px;
}

.input-group{
    margin-bottom:25px;
}

.input-group label{
    display:block;
    margin-bottom:10px;
    font-weight:600;
    color:#0f172a;
}

.input-group input{
    width:100%;
    padding:16px;
    border-radius:16px;
    border:2px solid #dbeafe;
    font-size:1rem;
}

button{
    border:none;
    padding:16px 30px;
    border-radius:16px;
    color:white;
    font-weight:700;
    cursor:pointer;
    transition:.3s;
}

.btn-agregar{
    background:#004aad;
}

.btn-agregar:hover{
    background:#006eff;
}

.galeria-admin{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:25px;
}

.card{
    background:white;
    border-radius:25px;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,70,170,.15);
}

.card img{
    width:100%;
    height:250px;
    object-fit:cover;
}

.card-content{
    padding:20px;
}

.card-content h3{
    margin-bottom:15px;
}

.actions{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

.btn-delete{
    background:#dc2626;
}

.btn-edit{
    background:#f59e0b;
}

.btn-delete:hover{
    background:#ef4444;
}

.btn-edit:hover{
    background:#fbbf24;
}

@media(max-width:768px){

    h1{
        font-size:2.2rem;
    }

}

</style>
</head>
<body>

<div class="container">

    <h1>Panel Administrador</h1>

    <p class="sub">
        Desde acá podés agregar, editar o eliminar trabajos automáticamente.
    </p>

    <div class="formulario">

        <div class="input-group">
            <label>Título del trabajo</label>
            <input type="text" id="titulo" placeholder="Ej: Remodelación Moderna">
        </div>

        <div class="input-group">
            <label>Seleccionar imagen</label>
            <input type="file" id="imagen" accept="image/*">
        </div>

        <button class="btn-agregar" onclick="agregarTrabajo()">
            Agregar trabajo
        </button>

    </div>

    <div class="galeria-admin" id="galeriaAdmin"></div>

</div>

<script>

let trabajos = JSON.parse(localStorage.getItem('trabajos'));

if(!trabajos){

    trabajos = [

        {
            titulo:'Construcción Profesional',
            imagen:'https://images.unsplash.com/photo-1504307651254-35680f356dfd?q=80&w=1200&auto=format&fit=crop'
        },

        {
            titulo:'Remodelación Moderna',
            imagen:'https://images.unsplash.com/photo-1541888946425-d81bb19240f5?q=80&w=1200&auto=format&fit=crop'
        },

        {
            titulo:'Terminaciones Premium',
            imagen:'https://images.unsplash.com/photo-1517581177682-a085bb7ffb15?q=80&w=1200&auto=format&fit=crop'
        }

    ];

    guardarTrabajos();
}

const galeriaAdmin = document.getElementById('galeriaAdmin');

function guardarTrabajos(){

    localStorage.setItem(
        'trabajos',
        JSON.stringify(trabajos)
    );

}

function renderTrabajos(){

    galeriaAdmin.innerHTML='';

    trabajos.forEach((trabajo,index)=>{

        galeriaAdmin.innerHTML += `

        <div class="card">

            <img src="${trabajo.imagen}">

            <div class="card-content">

                <h3>${trabajo.titulo}</h3>

                <div class="actions">

                    <button class="btn-edit" onclick="editarTrabajo(${index})">
                        Editar
                    </button>

                    <button class="btn-delete" onclick="eliminarTrabajo(${index})">
                        Eliminar
                    </button>

                </div>

            </div>

        </div>

        `;

    });

}

function agregarTrabajo(){

    const titulo = document.getElementById('titulo').value.trim();

    const imagenInput = document.getElementById('imagen');

    if(!titulo){

        alert('Escribí un título');
        return;
    }

    if(!imagenInput.files[0]){

        alert('Seleccioná una imagen');
        return;
    }

    const reader = new FileReader();

    reader.onload = function(e){

        trabajos.push({

            titulo:titulo,
            imagen:e.target.result

        });

        guardarTrabajos();

        renderTrabajos();

        document.getElementById('titulo').value='';

        imagenInput.value='';

        alert('Trabajo agregado correctamente');

    };

    reader.readAsDataURL(imagenInput.files[0]);

}

function eliminarTrabajo(index){

    const confirmar = confirm('¿Eliminar este trabajo?');

    if(confirmar){

        trabajos.splice(index,1);

        guardarTrabajos();

        renderTrabajos();

    }

}

function editarTrabajo(index){

    const nuevoTitulo = prompt(
        'Nuevo título:',
        trabajos[index].titulo
    );

    if(nuevoTitulo !== null && nuevoTitulo.trim() !== ''){

        trabajos[index].titulo = nuevoTitulo;

        guardarTrabajos();

        renderTrabajos();

    }

}

renderTrabajos();

</script>

</body>
</html>
